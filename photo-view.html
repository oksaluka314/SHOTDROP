<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея: Весілля Олександра та Марії | SHOTDROP</title>
    <link rel="stylesheet" href="style.css">
  </head>
<body>

<div class="modal" id="photoModal">
    <span class="close-modal" onclick="closePhoto()">&times;</span>

    <div class="modal-image-side">
        <img id="modalImg" src="https://i.pinimg.com/736x/5b/7a/99/5b7a99cdd58858bba39a9fb178b4a8da.jpg" alt="Full size photo">
    </div>

    <div class="modal-sidebar">
        <div class="like-section">
            <button class="btn-like" id="likeBtn" onclick="toggleLike()">
                <span id="likeIcon">♡</span> Мені подобається це фото
            </button>
        </div>

        <div class="comments-section" id="commentsList">
            <h3 class="comments-title">Побажання до ретуші</h3>
            <div class="comment-item">
                <p><strong>Марія:</strong> Дуже люблю це фото! Можна зробити фон більш розмитим?</p>
            </div>
        </div>

        <div class="comment-input-area">
            <textarea id="commentText" placeholder="Напишіть, що змінити або просто залиште відгук..."></textarea>
            <button class="btn-send" onclick="addComment()">Надіслати коментар</button>
        </div>
    </div>
</div>

</body>
</html>
