<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Перегляд окремої фотографії в SHOTDROP з можливістю вподобати знімок і залишити побажання до ретуші.">
    <title>Галерея: Весілля Олександра та Марії | SHOTDROP</title>
    <link rel="stylesheet" href="style.css">
    <script>
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
  </head>
<body>

<main class="modal" id="photoModal">
    <button class="close-modal" onclick="closePhoto()" aria-label="Закрити вікно фотографії">&times;</button>

    <div class="modal-image-side">
        <img id="modalImg" src="https://i.pinimg.com/736x/5b/7a/99/5b7a99cdd58858bba39a9fb178b4a8da.jpg" alt="Фотографія в повному розмірі">
    </div>

    <div class="modal-sidebar">
        <div class="like-section">
            <button class="btn-like" id="likeBtn" onclick="toggleLike()" aria-label="Позначити як вподобане">
                <span id="likeIcon">♡</span> Мені подобається це фото
            </button>
        </div>

        <div class="comments-section" id="commentsList">
            <h1 class="comments-title">Побажання до ретуші</h1>
            <div class="comment-item">
                <p><strong>Марія:</strong> Дуже люблю це фото! Можна зробити фон більш розмитим?</p>
            </div>
        </div>

        <div class="comment-input-area">
            <textarea id="commentText" placeholder="Напишіть, що змінити або просто залиште відгук..." aria-label="Поле для введення коментарю до фотографії"></textarea>
            <button class="btn-send" onclick="addComment()" aria-label="Надіслати коментар">Надіслати коментар</button>
        </div>
    </div>
</main>

</body>
<script src="script.js"></script>
</html>
