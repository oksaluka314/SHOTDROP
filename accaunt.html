<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід для фотографів | SHOTDROP</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="logo"><a href="index.html">SHOTDROP</a></div>
<div class="login-box">
    <div class="tabs">
        <div class="tab active">Вхід</div>
        <div class="tab">Реєстрація</div>
    </div>
    <form action="dashboard.html">
        <label style="font-size: 12px; text-transform: uppercase; font-weight: 700;">Email</label>
        <input type="email" placeholder="your@email.com" required>
        <label style="font-size: 12px; text-transform: uppercase; font-weight: 700;">Пароль</label>
        <input type="password" placeholder="********" required>
        <button type="submit" class="btn-login">Увійти в кабінет</button>
    </form>
    <p><a href="#">Забули пароль?</a></p>
</div>

</body>
</html>
