<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вхід і реєстрація фотографа в SHOTDROP для доступу до кабінету, фотогалерей і налаштувань акаунта.">
    <title>Вхід для фотографів | SHOTDROP</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

<div class="page-wrapper">
    <div class="header-minimal">
        <a href="index.html" class="logo" aria-label="На головну сторінку SHOTDROP">SHOTDROP</a>
    </div>

    <main class="login-box">
        <h1>Вхід для фотографів</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="login" >Вхід</div>
            <div class="tab" data-tab="register">Реєстрація</div>
        </div>
        
        <!-- Login Form -->
        <form id="login-form" class="tab-content active">
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" class="form-input" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="login-password">Пароль:</label>
                <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Увійти в кабінет</button>
            <div class="form-footer">
                <label id="none-account-link" class="forgot-password">Немає акаунта?</label>
            </div>
        </form>
        
        <!-- Registration Form -->
        <form id="register-form" class="tab-content">
            <div class="form-group">
                <label for="register-name">Ім'я:</label>
                <input type="text" id="register-name" class="form-input" placeholder="Ваше ім'я" required>
            </div>
            
            <div class="form-group">
                <label for="register-email">Email:</label>
                <input type="email" id="register-email" class="form-input" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="register-password">Пароль:</label>
                <input type="password" id="register-password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="register-confirm">Підтвердіть пароль:</label>
                <input type="password" id="register-confirm" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Зареєструватися</button>
            
            <div class="form-footer">
                <label id="already-account-link" class="forgot-password" >Уже маєте акаунт?</label>
            </div>
        </form>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
