<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої галереї | SHOTDROP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script>
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  const checkAccess = async () => {
    try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (error) throw error;

        if (!session) {
            console.log("Сесії немає, перенаправляю...");
            window.location.href = 'account.html';
        } else {
            console.log("Доступ дозволено для:", session.user.email);
            // ПОКАЗУЄМО КОНТЕНТ
            const mainContent = document.querySelector('main') || document.getElementById('hidden');
        if (mainContent) {
            mainContent.style.display = 'block';
        } 
           
        }
    } catch (err) {
        console.error("Помилка перевірки доступу:", err.message);
        window.location.href = 'account.html';
    }
};

checkAccess();

    </script>
    <script src="script.js"></script>
</head>
<body>
<main id="hidden" style ="display: none;">
<div class="dashboard">
<aside class="sidebar">
    <div class="logo"><a href="index.html">SHOTDROP</a></div>
    <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="projects">Мої проєкти</a>
        <a href="#" class="nav-item" data-page="clients">Клієнти</a>
        <a href="#" class="nav-item" data-page="pricing">Тарифний план</a>
        <a href="#" class="nav-item" data-page="settings">Налаштування</a>
        <a href="#" class="nav-item" id="logout-btn" >Видалити акаунт</a>
    </nav>
</aside>

<div class="main">
    <div class="header-dash">
        <h1>Ваші галереї</h1>
        <a href="#" class="btn-add">+ Нова зйомка</a>
    </div>

    <div class="project-grid">
        <div class="project-card">
            <div class="project-thumb">
                <a href="private-gallery.html"><img src="https://i.pinimg.com/736x/f4/52/ce/f452ce0c355088846809f040ace7d0d1.jpg" alt=""></a>
                <span class="project-status">Активна</span>
            </div>
            <div class="project-info">
                <h3>Весілля Олександра та Марії</h3>
                <div class="project-stats">
                    <span>124 фото</span>
                    <span>12 ❤️ відібрано</span>
                </div>
            </div>
        </div>
        <div class="project-card">
            <div>
                 <img  src="https://i.pinimg.com/736x/2d/a6/cf/2da6cf66094eb064216d51334b14f095.jpg" alt="">
            </div>
            <div class="project-info">
                <h3>Інтер'єрна зйомка </h3>
                <div class="project-stats">
                    <span>45 фото</span>
                    <span>0 відібрано</span>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</main>
</body>
</html>
