<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ до фото | SHOTDROP</title>
  <link rel="stylesheet" href="style.css">
  
  <script>
      const savedTheme = localStorage.getItem('theme') || 'light';
       document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
 <div class="header-minimal">
        <a href="index.html" class="logo">SHOTDROP</a>
    </div>
<div class="access-container">

  <h2>Введіть код доступу</h2>
  <p class="access-description">Ваш фотограф мав надіслати вам унікальний код у форматі XXX-XXX-XXX</p>
  
  <form class="access-form">
    <div class="form-group">
      <label for="access-code">Код доступу:</label>
      <input type="text" id="access-code" class="form-input" placeholder="000-000-000" required>
    </div>
  
    <button type="submit" class="btn-submit">Переглянути фото</button>
  </form>
  
  <div class="access-footer">
    <a href="index.html" class="back-link">← На головну</a>
  </div>
</div>

</body>
<script src="script.js"></script>
</html>
